    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-luxury-marketplace.com/" />
    <meta property="og:title" content="Elite Assets | Global Luxury Marketplace" />

    <meta property="og:image" content="%PUBLIC_URL%/og-image-luxury.jpg" />

    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://your-luxury-marketplace.com/" />
    <meta property="twitter:title" content="Elite Assets | Global Luxury Marketplace" />
    <meta property="twitter:description" content="Trade and invest in world-class luxury assets with unmatched security." />
    <meta property="twitter:image" content="%PUBLIC_URL%/og-image-luxury.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.yourdomain.com" />
    
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <style>
      body {
        margin: 0;
        background-color: #050505;
        overflow-x: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #050505;
        z-index: 9999;
      }
      .loader-logo {
        width: 100px;
        margin-bottom: 30px;
        filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        animation: pulse 2s infinite ease-in-out;
      }
      .loader-bar-container {
        width: 200px;
        height: 1px;
        background: rgba(255, 255, 255, 0.05);
        position: relative;
        overflow: hidden;
      }
      .loader-bar-progress {
        position: absolute;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, #d4af37, transparent);
        animation: loading 1.8s infinite cubic-bezier(0.65, 0, 0.35, 1);
      }
      .security-badge {
        position: absolute;
        bottom: 40px;
        color: rgba(255, 255, 255, 0.3);
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; transform: scale(0.95); }
        50% { opacity: 1; transform: scale(1); }
      }
      @keyframes loading {
        0% { left: -100%; }
        100% { left: 100%; }
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="text-align: center; padding: 100px 20px; color: #fff; background: #000; height: 100vh;">
        <h1 style="color: #d4af37;">Security Protocol Interrupted</h1>
        <p style="max-width: 600px; margin: 20px auto; color: #888;">This luxury marketplace requires JavaScript to initialize secure asset protocols and encrypted neural handshakes. Please enable JavaScript to proceed.</p>
      </div>
    </noscript>

    <div id="root">
      <div class="initial-loader">
        <img src="%PUBLIC_URL%/logo-gold.svg" alt="Elite Assets Logo" class="loader-logo" onerror="this.style.display='none'" />
        <div class="loader-bar-container">
          <div class="loader-bar-progress"></div>
        </div>
        <div class="security-badge">Encrypted Session Initialization</div>
      </div>
    </div>
  </body>
</html>
